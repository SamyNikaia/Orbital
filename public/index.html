<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ORBITAL // 1986</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Audiowide&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <canvas id="game"></canvas>
    <div class="scanlines"></div>

    <div id="hud">
      <div class="stat">
        <span class="label">Score</span>
        <span id="score" class="value cyan">0</span>
      </div>
      <div class="stat">
        <span class="label">Best</span>
        <span id="best" class="value pink">0</span>
      </div>
      <div class="stat">
        <span class="label">Combo</span>
        <span id="combo" class="value yellow">×1</span>
      </div>
      <div class="lives" id="lives"></div>
    </div>

    <div id="overlay" class="visible">
      <div class="bar"></div>
      <h1 id="overlay-title">ORBITAL</h1>
      <p class="sub">SOUTH BEACH&nbsp;//&nbsp;1986</p>
      <p id="overlay-text">Move the mouse — your moon orbits the planet.<br/>Deflect anything that comes for it.</p>
      <div class="actions">
        <button id="start">Insert Coin</button>
        <button id="menu" hidden>Menu</button>
      </div>
      <p id="overlay-hint" class="hint">click insert coin · space to start</p>
      <div class="bar"></div>
    </div>

    <script type="module" src="/game.js"></script>
  </body>
</html>
